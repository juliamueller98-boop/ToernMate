<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Revierkarte Fethiye–Datça</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
  <style>
    html, body, #map { width: 100%; height: 100%; min-height: 100dvh; margin: 0; }
    body { font-family: 'Poppins', ui-sans-serif, system-ui, sans-serif; color: #063943; background: #e7f8f7; overflow: hidden; }
    #map { position: fixed; inset: 0; z-index: 1; }
    #fallback { position: fixed; inset: 0; z-index: 3; display: none; align-items: center; justify-content: center; padding: 24px; text-align: center; background: #e7f8f7; }
    #fallback div { max-width: 320px; font-size: 14px; line-height: 1.5; color: #475569; }
    #fallback a { color: #147A8B; font-weight: 600; }
    .leaflet-div-icon { background: transparent; border: 0; }
    .sail-marker { display: block; width: 15px; height: 15px; border: 2.5px solid #fff; border-radius: 50%; box-shadow: 0 3px 7px rgba(0,49,58,0.45); }
    .sec1 { background: #2563EB; } .sec2 { background: #14B8A6; } .sec3 { background: #F59E0B; } .sec4 { background: #DC2626; } .sec5 { background: #7C3AED; }
    .me-marker { display: block; width: 16px; height: 16px; border: 3px solid #fff; border-radius: 50%; background: #0EA5E9; box-shadow: 0 0 0 4px rgba(14,165,233,0.3), 0 3px 8px rgba(0,49,58,0.4); }
    .leaflet-tooltip.sail-tooltip { border: 0; border-radius: 999px; padding: 3px 9px; color: #fff; background: #147A8B; box-shadow: 0 6px 16px rgba(0,49,58,0.22); font-weight: 600; }
    .leaflet-tooltip-top.sail-tooltip::before { border-top-color: #147A8B; }
    .leaflet-popup-content-wrapper { border-radius: 14px; }
    .leaflet-popup-content { margin: 12px 14px; font-size: 0.9rem; line-height: 1.38; color: #0D2B45; }
    .popup-title { display: block; margin-bottom: 6px; color: #147A8B; font-size: 1rem; font-weight: 600; }
    .popup-tip { margin: 0; }
    .popup-note { margin-top: 8px; padding-top: 6px; border-top: 1px solid rgba(20,122,139,0.18); color: rgba(6,57,67,0.7); font-size: 0.76rem; }
    .leaflet-control-attribution { font-size: 10px; background: rgba(255,255,255,0.9) !important; }
    .leaflet-control-attribution a { color: #147A8B; font-weight: 600; }
    .legend { padding: 8px 10px; border-radius: 12px; background: rgba(255,255,255,0.92); box-shadow: 0 6px 18px rgba(0,28,36,0.14); font-size: 11px; line-height: 1.5; color: #334155; }
    .legend b { display: block; margin-bottom: 3px; color: #0D2B45; font-size: 11px; }
    .legend .row { display: flex; align-items: center; gap: 6px; }
    .legend .dot { width: 9px; height: 9px; border-radius: 999px; flex: none; }
    .locate-btn { background: #fff; border: 0; border-radius: 10px; box-shadow: 0 4px 12px rgba(0,28,36,0.18); padding: 8px 10px; font: 600 12px 'Poppins', sans-serif; color: #147A8B; cursor: pointer; }
    .locate-btn:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <main id="map" aria-label="Revierkarte Fethiye bis Datça"></main>
  <div id="fallback"><div>Die Karte konnte nicht geladen werden. Vermutlich blockiert das Netzwerk den Karten-Server. Direkt öffnen: <a href="https://www.openstreetmap.org/#map=9/36.69/28.23" target="_blank" rel="noopener">OpenStreetMap</a></div></div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    (function () {
      function showFallback() { var f = document.getElementById("fallback"); if (f) f.style.display = "flex"; }
      if (!window.L) { showFallback(); return; }

      var SECTION_NAMES = ["Sektion 1 · Golf von Fethiye","Sektion 2 · Göcek → Marmaris","Sektion 3 · Hisarönü-Golf","Sektion 4 · Datça-Halbinsel","Sektion 5 · Knidos"];
      var SECTION_COLORS = ["#2563EB","#14B8A6","#F59E0B","#DC2626","#7C3AED"];

      var places = [
        { name:"Fethiye", lat:36.626, lng:29.109, sec:1, tip:"Startbasis, Bootsübernahme und Versorgen." },
        { name:"Göcek", lat:36.753, lng:28.936, sec:1, tip:"Sechs Marinas, fast immer ein Platz frei. Crewwechsel-Punkt." },
        { name:"Kapı Creek", lat:36.620, lng:28.900, sec:1, tip:"Fjordartige, rundum geschützte Restaurantbucht." },
        { name:"Karacaören", lat:36.548, lng:29.030, sec:1, tip:"Byzantinische Ruinen, Restaurant mit Steg. Nahe Gemiler." },
        { name:"Cleopatra's Bath Bay", lat:36.641, lng:28.855, sec:1, tip:"Versunkene antike Bäder zum Schnorcheln. Früh kommen." },
        { name:"Gemiler", lat:36.553, lng:29.067, sec:1, tip:"Byzantinische Klosterruinen, Badepause im Kanal." },
        { name:"Cold Water Bay", lat:36.563, lng:29.083, sec:1, tip:"Lokal mit Gratis-Frühstück, nur ~12 Plätze." },
        { name:"Sarsala Koyu", lat:36.675, lng:28.905, sec:1, tip:"Ruhige Restaurantbucht, guter Schutz aus Nord." },
        { name:"Tersane Adası", lat:36.660, lng:28.900, sec:1, tip:"Größte Insel im Göcek-Golf, alte Werftruine. Im Sommer voll." },
        { name:"Ölüdeniz", lat:36.549, lng:29.116, sec:2, tip:"Lagune für Yachten gesperrt, außen ankern. Paragliding." },
        { name:"Ekincik", lat:36.8285, lng:28.5488, sec:2, tip:"My Marina, Ausgangspunkt für den Dalyan-Ausflug." },
        { name:"Bozukkale", lat:36.575, lng:28.011, sec:2, tip:"Antike Festung Loryma, Sonnenuntergang von der Zitadelle." },
        { name:"Marmaris", lat:36.852, lng:28.275, sec:2, tip:"Großes Charterzentrum, Versorgung, Port of Entry." },
        { name:"Dirsek Bükü", lat:36.685, lng:27.981, sec:3, tip:"Sehr ruhig, klares Wasser, Meltemi kaum spürbar." },
        { name:"Bencik Bay", lat:36.780, lng:28.043, sec:3, tip:"Tiefer Einschnitt, vollständig geschützt, kein Lokal." },
        { name:"Selimiye Koyu", lat:36.700, lng:28.100, sec:3, tip:"Stylisches Dorf, mehrere Restaurants, Schwimmsteg." },
        { name:"Bozburun", lat:36.686, lng:28.045, sec:3, tip:"Traditioneller Guletbau, einheimisches Flair." },
        { name:"Sailors Paradise (Kocabahçe)", lat:36.720, lng:28.005, sec:3, tip:"Familien-Restaurantsteg, eigene Stromversorgung." },
        { name:"Orhaniye", lat:36.762, lng:28.128, sec:3, tip:"Begehbare Sandbank (Kızkumu), Marti Marina." },
        { name:"Datça", lat:36.721, lng:27.690, sec:4, tip:"Authentischer Stadthafen, Restaurant Maradona, Port of Entry." },
        { name:"Palamut Limanı", lat:36.669, lng:27.505, sec:4, tip:"Ruhiger Schutzhafen. Flache Einfahrt, langsam einlaufen." },
        { name:"Mersincik", lat:36.751, lng:27.477, sec:4, tip:"Einsamer Naturankerplatz an der NW-Spitze, keine Versorgung." },
        { name:"Hayıt Bükü", lat:36.632, lng:27.545, sec:4, tip:"Geschützte Südbucht mit Restaurantanleger." },
        { name:"Knidos", lat:36.683, lng:27.378, sec:5, tip:"Antiker Naturhafen, Highlight. Nordmole überspült, Westkap früh runden." }
      ];

      try {
        var map = L.map("map", { center:[36.69, 28.23], zoom:9, zoomControl:true, attributionControl:false, preferCanvas:true });
        L.control.attribution({ prefix:false, position:"bottomright" }).addTo(map);
        var tiles = L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19,
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap-Mitwirkende</a>'
        });
        var tileErrors = 0;
        tiles.on("tileerror", function () { tileErrors++; if (tileErrors > 6) showFallback(); });
        tiles.addTo(map);

        var all = [];
        places.forEach(function (p) {
          var ll = [p.lat, p.lng]; all.push(ll);
          var color = SECTION_COLORS[p.sec - 1];
          var icon = L.divIcon({ className:"", html:'<span class="sail-marker sec' + p.sec + '"></span>', iconSize:[15,15], iconAnchor:[7,7], popupAnchor:[0,-8], tooltipAnchor:[0,-9] });
          var popup = '<strong class="popup-title">' + p.name + '</strong><p class="popup-tip"><strong>Tipp:</strong> ' + p.tip + '</p><div class="popup-note">Hinweis: nicht zur Navigation verwenden.</div>';
          L.marker(ll, { icon: icon, title: p.name }).addTo(map).bindPopup(popup).bindTooltip(p.name, { direction:"top", className:"sail-tooltip", opacity:0.95 });
        });

        var Legend = L.Control.extend({
          options: { position: "topright" },
          onAdd: function () {
            var div = L.DomUtil.create("div", "legend");
            var html = "<b>Sektionen</b>";
            for (var i = 0; i < SECTION_NAMES.length; i++) {
              html += '<div class="row"><span class="dot" style="background:' + SECTION_COLORS[i] + '"></span>' + SECTION_NAMES[i] + "</div>";
            }
            div.innerHTML = html;
            return div;
          }
        });
        map.addControl(new Legend());

        // Eigene Position (nur lokal, wird nicht übertragen)
        var meMarker = null, meCircle = null;
        var LocateCtrl = L.Control.extend({
          options: { position: "topleft" },
          onAdd: function () {
            var div = L.DomUtil.create("div", "leaflet-bar");
            var btn = L.DomUtil.create("button", "locate-btn", div);
            btn.type = "button"; btn.innerHTML = "Meine Position";
            L.DomEvent.on(btn, "click", function (e) {
              L.DomEvent.stop(e);
              if (!navigator.geolocation) { alert("Standort wird von diesem Gerät nicht unterstützt."); return; }
              btn.innerHTML = "Suche …";
              navigator.geolocation.getCurrentPosition(function (pos) {
                var ll = [pos.coords.latitude, pos.coords.longitude];
                var acc = pos.coords.accuracy || 50;
                if (meMarker) { meMarker.setLatLng(ll); } else {
                  var micon = L.divIcon({ className:"", html:'<span class="me-marker"></span>', iconSize:[16,16], iconAnchor:[8,8] });
                  meMarker = L.marker(ll, { icon: micon, title:"Meine Position" }).addTo(map).bindTooltip("Meine Position", { direction:"top", className:"sail-tooltip", opacity:0.95 });
                }
                if (meCircle) { meCircle.setLatLng(ll).setRadius(acc); } else {
                  meCircle = L.circle(ll, { radius: acc, color:"#0EA5E9", weight:1, fillColor:"#0EA5E9", fillOpacity:0.12 }).addTo(map);
                }
                map.setView(ll, Math.max(map.getZoom(), 12));
                btn.innerHTML = "Meine Position";
              }, function () {
                alert("Standort konnte nicht ermittelt werden. Bitte im Browser die Standortfreigabe erlauben.");
                btn.innerHTML = "Meine Position";
              }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 });
            });
            return div;
          }
        });
        map.addControl(new LocateCtrl());

        map.fitBounds(L.latLngBounds(all).pad(0.08), { maxZoom:10 });
        setTimeout(function () { try { map.invalidateSize(); } catch (e) {} }, 200);
      } catch (e) { showFallback(); }
    })();
  </script>
</body>
</html>
