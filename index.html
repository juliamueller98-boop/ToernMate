    function crewForNight(n) {
      const base = ["Christian", "Laurens", "Greta", "Sophie"];
      if (n <= 1) return base.concat(["Malte", "Melina", "Ben"]);
      if (n >= 2 && n <= 6) return base.concat(["Malte", "Melina", "Ben", "Julia"]);
      if (n === 7) return base.concat(["Julia", "Kathi", "Jonas", "Ben"]);
      return base.concat(["Julia", "Kathi", "Jonas"]); // 8..14
    }

    /* ============================================================
       UTILITIES
       ============================================================ */
    function useLocalStorage(key, initial) {
      const [val, setVal] = useState(() => {
        try {
          const s = localStorage.getItem(key);
          return s !== null ? JSON.parse(s) : initial;
        } catch (e) { return initial; }
      });
      useEffect(() => {
        // TODO: Firebase – hier später zusätzlich in Firestore synchronisieren
        try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
      }, [key, val]);
      return [val, setVal];
    }

    function startOfDay(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }

    // 0 = Tag 1; negativ = vor Törn; >= TRIP_DAYS = nach Törn
    function tripDayOffset(now) {
      const start = startOfDay(new Date(TRIP_START + "T00:00:00"));
      const today = startOfDay(now);
      return Math.round((today - start) / 86400000);
    }

    function fmtDate(iso) {
      const wd = ["So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"];
      const d = new Date(iso + "T00:00:00");
      const dd = String(d.getDate()).padStart(2, "0");
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      return wd[d.getDay()] + " " + dd + "." + mm + ".";
    }

    function speak(text) {
      try {
        if (!("speechSynthesis" in window)) return;
        const u = new SpeechSynthesisUtterance(text);
        u.lang = "tr-TR";
        const voices = window.speechSynthesis.getVoices() || [];
        const tr = voices.filter(v => v.lang && v.lang.toLowerCase().indexOf("tr") === 0)[0];
        if (tr) u.voice = tr;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(u);
      } catch (e) {}
    }

    /* ============================================================
       ICONS (Inline-SVG, Lucide-Stil)
       ============================================================ */
    function Svg(props) {
      const { size, children } = props;
      return (
        <svg width={size || 24} height={size || 24} viewBox="0 0 24 24" fill="none"
             stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          {children}
        </svg>
      );
    }

    /* ============================================================
       KLEINE UI-BAUSTEINE
       ============================================================ */

    function ProgressBar(props) {

      return (
        <div className="w-full">
          <div className="flex justify-between text-xs text-steingrau mb-1">

    /* ============================================================
       TAB 1 – HEUTE
       ============================================================ */
    function Countdown() {
      const [now, setNow] = useState(new Date());
      useEffect(() => {
        const t = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(t);
      }, []);
      const target = new Date(TRIP_START + "T00:00:00").getTime();
      const diff = target - now.getTime();
      const offset = tripDayOffset(now);

      if (offset >= 0 && offset < TRIP_DAYS) {
        const stage = ITINERARY[offset];
        const h = stage ? harborById(stage.harborId) : null;
        return (
          <Card className="p-5 bg-tiefblau text-white">
            <div className="text-sm text-seegruen">{TRIP_NAME}</div>
            <div className="text-3xl font-semibold mt-1">Tag {offset + 1} von {TRIP_DAYS}</div>
            {h && (
              <div className="flex items-center gap-2 mt-3 text-seegruen">
                <IcMapPin size={18} /><span className="text-white font-medium">{h.name}</span>
              </div>
            )}
            {stage && stage.note && <div className="text-sm text-white/70 mt-1">{stage.note}</div>}
          </Card>
        );
      }
      if (offset >= TRIP_DAYS) {
        return (
          <Card className="p-5 bg-tiefblau text-white">
            <div className="text-sm text-seegruen">{TRIP_NAME}</div>
            <div className="text-2xl font-semibold mt-1">Törn beendet</div>
            <div className="text-white/70 mt-1">Gute Heimreise und bis zum nächsten Mal.</div>
          </Card>
        );
      }
      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const mins = Math.floor((diff % 3600000) / 60000);
      const secs = Math.floor((diff % 60000) / 1000);
      const Box = (b) => (
        <div className="flex-1 bg-white/10 rounded-xl py-3">
          <div className="text-2xl font-semibold">{String(b.v).padStart(2, "0")}</div>
          <div className="text-xs text-seegruen">{b.l}</div>
        </div>
      );
      return (
        <Card className="p-5 bg-tiefblau text-white">
          <div className="text-sm text-seegruen">{TRIP_NAME} · Start {fmtDate(TRIP_START)}</div>
          <div className="text-lg font-medium mt-1 mb-3">Noch bis zum Ablegen</div>
          <div className="flex gap-2 text-center">
            <Box v={days} l="Tage" /><Box v={hours} l="Std" /><Box v={mins} l="Min" /><Box v={secs} l="Sek" />
          </div>
        </Card>
      );
    }

    function KitchenDuty() {
      const [history, setHistory] = useLocalStorage("tm_kitchen_history", []);
      const [rolling, setRolling] = useState(false);
      const [flash, setFlash] = useState(null);

      const now = new Date();
      let night = tripDayOffset(now) + 1;
      if (night < 1) night = 1;
      if (night > TRIP_DAYS) night = TRIP_DAYS;
      const present = crewForNight(night);

      function counts() {
        const c = {};
        present.forEach(n => { c[n] = 0; });
        history.forEach(h => { if (c[h.name] !== undefined) c[h.name] += 1; });
        return c;
      }

      function roll() {
        const c = counts();
        const max = Math.max.apply(null, present.map(n => c[n]));
        // Wer selten dran war, bekommt mehr Gewicht
        const weighted = [];
        present.forEach(n => {
          const w = (max - c[n]) + 1;
          for (let i = 0; i < w; i++) weighted.push(n);
        });
        setRolling(true);
        let ticks = 0;
        const iv = setInterval(() => {
          setFlash(present[Math.floor(Math.random() * present.length)]);
          ticks++;
          if (ticks > 12) {
            clearInterval(iv);
            const pick = weighted[Math.floor(Math.random() * weighted.length)];
            setFlash(pick);
            setRolling(false);
            setHistory(history.concat([{ name: pick, night: night, ts: Date.now() }]));
          }
        }, 70);
      }

      const c = counts();
      return (
        <Card className="p-5">
          <div className="flex items-center gap-3 mb-3">
            <IconCircle bg="bg-sonnenorange"><IcUtensils size={20} /></IconCircle>
            <div>
              <div className="font-semibold text-tiefblau">Küchendienst</div>
              <div className="text-xs text-steingrau">Anwesend heute: {present.length} Personen</div>
            </div>
          </div>

          <div className="text-center py-4 bg-wolkenweiss rounded-xl mb-3">
            <div className="text-xs text-steingrau mb-1">{flash ? (rolling ? "wird ausgewürfelt …" : "Heute kocht") : "Noch nicht gewürfelt"}</div>
            <div className="text-2xl font-semibold text-tiefblau min-h-[2rem]">{flash || "—"}</div>
          </div>

          <button onClick={roll} disabled={rolling}
                  className="w-full flex items-center justify-center gap-2 bg-tiefblau text-white font-medium rounded-xl py-3 active:scale-[0.98] transition disabled:opacity-60">
            <IcDice size={20} /> {rolling ? "Würfelt …" : "Küchendienst auswürfeln"}
          </button>

          <div className="mt-4">
            <div className="text-xs font-semibold text-steingrau uppercase tracking-wide mb-2">Bisher dran gewesen</div>
            <div className="flex flex-wrap gap-2">
              {present.map(n => (
                <span key={n} className="text-xs px-2.5 py-1 rounded-full bg-seegruen/40 text-tiefblau">
                  {n} · {c[n]}×
                </span>
              ))}
            </div>
            {history.length > 0 && (
              <button onClick={() => { if (confirm("Verlauf des Küchendienstes zurücksetzen?")) setHistory([]); }}
                      className="mt-3 text-xs text-steingrau underline flex items-center gap-1">
                <IcRefresh size={14} /> Verlauf zurücksetzen
              </button>
            )}
          </div>
        </Card>
      );
    }

    function Logbook(props) {
      const [entries, setEntries] = useLocalStorage("tm_logbook", {});
      const day = props.day;
      const entry = entries[day] || { text: "" };

        <div className="mt-3 pt-3 border-t border-wolkenweiss">

    /* ============================================================
       TAB 3 – LISTEN
       ============================================================ */
    function CheckList(props) {
      // props: storageKey, title, icon, defaults (array of strings), addable (bool)
      const [items, setItems] = useLocalStorage(props.storageKey, function () {
        return (props.defaults || []).map((t, i) => ({ id: "d" + i, text: t, done: false }));
      }());
      const [draft, setDraft] = useState("");

      function toggle(id) {
        setItems(items.map(it => it.id === id ? Object.assign({}, it, { done: !it.done }) : it));
      }
      function add() {
        const t = draft.trim();
        if (!t) return;
        setItems(items.concat([{ id: "u" + Date.now(), text: t, done: false }]));
        setDraft("");
      }
      function remove(id) { setItems(items.filter(it => it.id !== id)); }

      const done = items.filter(it => it.done).length;
      return (
        <Card className="p-5">
          <div className="flex items-center gap-3 mb-3">
            <IconCircle bg={props.iconBg || "bg-meeresblau"}>{props.icon}</IconCircle>
            <div className="font-semibold text-tiefblau">{props.title}</div>
          </div>
          <div className="mb-4"><ProgressBar done={done} total={items.length} /></div>

          {props.addable && (
            <div className="flex gap-2 mb-3">
              <input value={draft} onChange={(e) => setDraft(e.target.value)}
                     onKeyDown={(e) => { if (e.key === "Enter") add(); }}
                     placeholder="Artikel hinzufügen …"
                     className="flex-1 rounded-xl bg-wolkenweiss border border-wolkenweiss px-3 py-2 text-sm text-tiefblau outline-none focus:border-tuerkis" />
              <button onClick={add} className="bg-tuerkis text-white rounded-xl px-3 active:scale-95 transition">
                <IcPlus size={20} />
              </button>
            </div>
          )}

          <div className="space-y-1.5">
            {items.length === 0 && <div className="text-sm text-steingrau">Noch nichts auf der Liste.</div>}
            {items.map(it => (
              <div key={it.id} className="flex items-center gap-3 group">
                <button onClick={() => toggle(it.id)}
                        className={"shrink-0 w-6 h-6 rounded-md flex items-center justify-center border-2 transition " +
                          (it.done ? "bg-tuerkis border-tuerkis text-white" : "border-steingrau/40 text-transparent")}>
                  <IcCheck size={16} />
                </button>
                <span className={"flex-1 text-sm " + (it.done ? "line-through text-steingrau" : "text-tiefblau")}>{it.text}</span>
                {props.addable && (
                  <button onClick={() => remove(it.id)} className="text-steingrau/50 hover:text-sonnenorange p-1">
                    <IcTrash size={16} />
                  </button>
                )}
              </div>
            ))}
          </div>
        </Card>
      );
    }

    function TabWissen() {
      const [voiceHint, setVoiceHint] = useState(false);
      useEffect(() => {
        // Stimmen laden anstoßen (manche Browser liefern erst nach diesem Event)
        if ("speechSynthesis" in window) {
          window.speechSynthesis.getVoices();
          window.speechSynthesis.onvoiceschanged = function () {};
        }
      }, []);

      function trySpeak(text) {
        const voices = ("speechSynthesis" in window) ? (window.speechSynthesis.getVoices() || []) : [];
        const hasTr = voices.some(v => v.lang && v.lang.toLowerCase().indexOf("tr") === 0);
        if (!hasTr) setVoiceHint(true);
        speak(text);
      }

      return (
        <div className="space-y-4">
          <Section title="Segel-Basics" icon={<IcCompass size={20} />} iconBg="bg-meeresblau" defaultOpen={true}>
            <div className="space-y-3">
              {SAIL_BASICS.map((b, i) => (
                <div key={i}>
                  <div className="font-medium text-tiefblau text-sm">{b.term}</div>
                  <div className="text-sm text-steingrau">{b.text}</div>
                </div>
              ))}
            </div>
          </Section>

          <Section title="Türkisch für an Bord" icon={<IcVolume size={20} />} iconBg="bg-tuerkis">
            {voiceHint && (
              <div className="text-xs text-steingrau bg-wolkenweiss rounded-lg p-2 mb-3">
                Auf diesem Gerät ist keine türkische Stimme installiert, die Aussprache funktioniert daher
                eventuell nicht. In den Geräteeinstellungen lässt sich eine tr-Stimme nachladen.
              </div>
            )}
            <div className="space-y-1.5">
              {TR_PHRASES.map((p, i) => (
                <div key={i} className="flex items-center gap-3">
                  <button onClick={() => trySpeak(p.tr)}
                          className="shrink-0 w-9 h-9 rounded-full bg-seegruen/50 text-meeresblau flex items-center justify-center active:scale-90 transition">
                    <IcVolume size={18} />
                  </button>
                  <div className="flex-1">
                    <div className="text-sm font-medium text-tiefblau">{p.tr}</div>
                    <div className="text-xs text-steingrau">{p.de}</div>
                  </div>
                </div>
              ))}
            </div>
          </Section>

          <Section title="Notfall & Mayday" icon={<IcPhone size={20} />} iconBg="bg-sonnenorange">
            <div className="space-y-2">
              {EMERGENCY.map((e, i) => (
                <div key={i} className="flex items-center justify-between bg-wolkenweiss rounded-lg px-3 py-2">
                  <span className="text-sm text-tiefblau">{e.label}</span>
                  <span className="text-sm font-semibold text-tiefblau">{e.value}</span>
                </div>
              ))}
            </div>
            <div className="mt-3 bg-sand/60 rounded-xl p-3 text-sm text-tiefblau/90">
              <div className="flex items-center gap-2 font-semibold mb-1"><IcAlert size={16} /> Mayday-Ablauf</div>
              <p>Auf UKW-Kanal 16: „Mayday, Mayday, Mayday", dann den Bootsnamen dreimal nennen. Danach die
                Position durchgeben, die Art des Notfalls schildern, die Zahl der Personen an Bord nennen und
                sagen, welche Hilfe benötigt wird. Langsam und deutlich sprechen, auf Antwort warten.</p>
            </div>
            <div className="mt-2 text-xs text-steingrau">
              Notrufnummern bitte vor Reiseantritt vor Ort verifizieren, sie können sich ändern.
            </div>
          </Section>

          <Section title="Praktische Törn-Hinweise" icon={<IcAnchor size={20} />} iconBg="bg-tiefblau">
            <div className="space-y-3">
              {PRACTICAL_TIPS.map((t, i) => (
                <div key={i}>
                  <div className="font-medium text-tiefblau text-sm">{t.title}</div>
                  <div className="text-sm text-steingrau">{t.text}</div>
                </div>
              ))}
            </div>
          </Section>
        </div>
      );
    }

    /* ============================================================
       RECHTLICHER HINWEIS (Footer, ausklappbar)
       ============================================================ */
    function LegalFooter() {
      const [open, setOpen] = useState(false);
      return (
        <div className="mt-6 mb-2">
          <button onClick={() => setOpen(!open)} className="text-xs text-steingrau underline">
            Rechtlicher Hinweis & Datenschutz
          </button>
          {open && (
            <div className="mt-2 text-xs text-steingrau space-y-2 bg-white rounded-xl p-4">
              <p>Diese App ist eine private, nicht-kommerzielle Anwendung und ausschließlich für den persönlichen
                Gebrauch einer geschlossenen Reisegruppe gedacht.</p>
              <p>Es werden keine personenbezogenen Daten an Dritte weitergegeben oder auf fremden Servern abgelegt.
                Alle Eingaben verbleiben lokal im Browser (localStorage) auf dem jeweiligen Gerät.</p>
              <p>Die App ist nicht öffentlich zugänglich und richtet sich nur an eingeladene Nutzerinnen und Nutzer.</p>
              <p>Sämtliche Inhalte wurden selbst verfasst oder aus öffentlich zugänglichen Quellen zusammengetragen
                und in eigenen Worten neu formuliert. Es werden keine urheberrechtlich geschützten Texte oder Bilder
                Dritter verwendet.</p>
            </div>
          )}
        </div>
      );
    }

    /* ============================================================
       APP-SHELL
       ============================================================ */
    function App() {
      const [tab, setTab] = useState("heute");
      const TABS = [
        { id: "heute", label: "Heute", icon: IcHome },
        { id: "reise", label: "Reise", icon: IcMap },
        { id: "listen", label: "Listen", icon: IcBasket },
        { id: "wissen", label: "Wissen", icon: IcBook }
      ];
      return (
        <div className="min-h-screen flex flex-col max-w-md mx-auto">
          {/* Header */}
          <header className="sticky top-0 z-10 bg-wolkenweiss/95 backdrop-blur border-b border-black/5"
                  style={{ paddingTop: "env(safe-area-inset-top)" }}>
            <div className="flex items-center gap-3 px-4 py-3">
              <img src={MARK_SRC} alt="TörnMate" width="40" height="40" className="rounded-full" />
              <div className="leading-tight">
                <div className="text-lg font-semibold text-tiefblau">{APP_NAME}</div>
                <div className="text-xs text-meeresblau">{APP_TAGLINE}</div>
              </div>
            </div>
          </header>

          {/* Content */}
          <main className="flex-1 px-4 pt-4 pb-28 no-scrollbar">
            {tab === "heute" && <TabHeute />}
            {tab === "reise" && <TabReise />}
            {tab === "listen" && <TabListen />}
            {tab === "wissen" && <TabWissen />}
            <LegalFooter />
          </main>

          {/* Bottom-Nav */}
          <nav className="fixed bottom-0 left-0 right-0 z-10 max-w-md mx-auto bg-white border-t border-black/5"
               style={{ paddingBottom: "env(safe-area-inset-bottom)" }}>
            <div className="flex">
              {TABS.map(t => {
                const Active = tab === t.id;
                const Ic = t.icon;
                return (
                  <button key={t.id} onClick={() => setTab(t.id)}
                          className={"flex-1 flex flex-col items-center gap-1 py-2.5 transition " +
                            (Active ? "text-tiefblau" : "text-steingrau")}>
                    <Ic size={24} />
                    <span className="text-[11px] font-medium">{t.label}</span>
                  </button>
                );
              })}
            </div>
          </nav>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <!-- Boot: CDN-Globals pruefen, JSX transpilieren, Fehler sichtbar machen -->
  <script>
    (function () {
      function show(html) {
        var r = document.getElementById("root");
        if (r) r.innerHTML =
          '<div style="font-family:Poppins,sans-serif;max-width:520px;margin:48px auto;padding:24px;color:#0D2B45;line-height:1.5">' + html + '</div>';
      }
      window.addEventListener("error", function (e) {
        if (window.__tmReady) return;
        var msg = (e && e.message) ? e.message : String(e);
        show('<b style="color:#147A8B">TörnMate konnte nicht starten</b><br><br>' +
          '<code style="white-space:pre-wrap;display:block;background:#F7F9FA;border-radius:8px;padding:12px;color:#b00020;font-size:13px">' +
          msg + '</code><br>Falls hier von React, ReactDOM oder Babel die Rede ist, lag es an der Internet- bzw. CDN-Verbindung &ndash; einfach neu laden. Andernfalls schick mir diese Meldung als Screenshot.');
      });
      var tries = 0;
      function boot() {
        tries++;
        if (!(window.React && window.ReactDOM && window.Babel)) {
          if (tries > 100) {
            show('<b style="color:#147A8B">Bibliotheken nicht geladen</b><br><br>' +
              'React, ReactDOM oder Babel konnte nicht vom CDN geladen werden. Bitte Internetverbindung pruefen und die Seite neu laden. ' +
              'Falls ein Adblocker oder Firmen-/Schul-Netzwerk aktiv ist, kann dieser die CDN-Skripte (jsdelivr.net) blockieren.');
            return;
          }
          setTimeout(boot, 100);
          return;
        }
        try {
          var src = document.getElementById("appsrc").textContent;
          var out = Babel.transform(src, { presets: ["react"], sourceType: "script" }).code;
          (0, eval)(out);
          window.__tmReady = true;
        } catch (err) {
          var m = (err && err.message) ? err.message : String(err);
          show('<b style="color:#147A8B">Fehler im App-Code</b><br><br>' +
            '<code style="white-space:pre-wrap;display:block;background:#F7F9FA;border-radius:8px;padding:12px;color:#b00020;font-size:13px">' +
            m + '</code>');
        }
      }
      if (document.readyState !== "loading") boot();
      else document.addEventListener("DOMContentLoaded", boot);
    })();
  </script>
</body>
</html>
