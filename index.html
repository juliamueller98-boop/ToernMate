    /* DATENHALTUNG: alles über useLocalStorage(). Spätere Firebase-Anbindung
       genau hier zentral. // TODO: Firebase – geteilte Listen -> Firestore-Collection,
       persönliche -> pro-Gerät/Nutzer-Dokument. */
    function useLocalStorage(key, initial) {
      const [val, setVal] = useState(() => {
        try { const s = localStorage.getItem(key); return s !== null ? JSON.parse(s) : initial; }
        catch (e) { return initial; }
      });
      useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {} }, [key, val]);
      return [val, setVal];
    }

    function crewForNight(n) {
      const base = ["Christian", "Laurens", "Greta", "Sophie"];
      if (n <= 1) return base.concat(["Malte", "Melina", "Ben"]);
      if (n >= 2 && n <= 6) return base.concat(["Malte", "Melina", "Ben", "Julia"]);
      if (n === 7) return base.concat(["Julia", "Kathi", "Jonas", "Ben"]);
      return base.concat(["Julia", "Kathi", "Jonas"]);
    }

    function startOfDay(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
    function autoOffset() {
      const start = startOfDay(new Date(TRIP_START + "T00:00:00"));
      return Math.round((startOfDay(new Date()) - start) / 86400000);
    }
    function isoForDay(n) { const d = new Date(TRIP_START + "T12:00:00"); d.setDate(d.getDate() + (n - 1)); return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); }
    function fmtDate(iso) {
      if (!iso) return "Datum offen";
      const wd = ["So","Mo","Di","Mi","Do","Fr","Sa"]; const d = new Date(iso + "T12:00:00");
      return wd[d.getDay()] + " " + String(d.getDate()).padStart(2,"0") + "." + String(d.getMonth()+1).padStart(2,"0") + ".";
    }
    function fmtDateLong(iso) {
      if (!iso) return "Datum offen";
      const wd = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"]; const d = new Date(iso + "T12:00:00");
      return wd[d.getDay()] + ", " + String(d.getDate()).padStart(2,"0") + "." + String(d.getMonth()+1).padStart(2,"0") + ".";
    }
    function range(n) { const a = []; for (let i = 0; i < n; i++) a.push(i); return a; }
    function shuffle(arr) { const a = arr.slice(); for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
    const AVA_COLORS = ["bg-meeresblau","bg-tuerkis","bg-tiefblau","bg-sonnenorange","bg-steingrau"];
    function avatarColor(name) { let s=0; for (let i=0;i<name.length;i++) s+=name.charCodeAt(i); return AVA_COLORS[s%AVA_COLORS.length]; }
    function speak(text) {
      try {
        if (!("speechSynthesis" in window)) return;
        const u = new SpeechSynthesisUtterance(text); u.lang = "tr-TR";
        const voices = window.speechSynthesis.getVoices() || [];
        const tr = voices.filter(v => v.lang && v.lang.toLowerCase().indexOf("tr") === 0)[0];
        if (tr) u.voice = tr;
        window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
      } catch (e) {}
    }

    function DayProvider(props) {
      const [manual, setManual] = useLocalStorage("tm_manual_day", null);
      const auto = autoOffset();
      const index = (manual != null) ? (manual - 1) : auto;
      const inTrip = index >= 0 && index < TRIP_DAYS;
      const dayNumber = inTrip ? (index + 1) : null;
      return <DayCtx.Provider value={{ manual, setManual, auto, index, inTrip, dayNumber }}>{props.children}</DayCtx.Provider>;
    }
    function useDay() { return useContext(DayCtx); }

          <div className="flex justify-between text-xs text-steingrau mb-1"><span>{props.done} / {props.total}</span><span>{pct}%</span></div>

    /* ============================================================
       TAB: HEUTE
       ============================================================ */
    function DaySelector() {

      return (
        <Card className="p-3">
          <div className="flex items-center justify-between gap-2">
            <button onClick={() => setDay((shownDay || 1) - 1)} className="w-9 h-9 rounded-full bg-wolkenweiss text-tiefblau flex items-center justify-center"><IcChevLeft size={20} /></button>
            <div className="text-center">
              {shownDay ? (
                <div><div className="text-lg font-semibold text-tiefblau leading-tight">{fmtDateLong(isoForDay(shownDay))}</div>
                  <div className="text-xs text-steingrau mt-0.5">Tag {shownDay} von {TRIP_DAYS} · {d.manual != null ? "manuell" : "automatisch"}</div></div>
              ) : (
                <div><div className="text-sm font-semibold text-tiefblau">{d.auto < 0 ? "Törn startet " + fmtDate(TRIP_START) : "Törn beendet"}</div>

        </Card>

    function KitchenDuty() {
      const d = useDay();
      const [history, setHistory] = useLocalStorage("tm_kitchen_history", []);
      const [rolling, setRolling] = useState(false);
      const [flash, setFlash] = useState(null);
      const [pending, setPending] = useState(null);
      const [confirmed, setConfirmed] = useState(false);
      const [creditOpen, setCreditOpen] = useState(false);
      const night = d.inTrip ? d.dayNumber : 1;
      const present = crewForNight(night);
      function counts() { const c = {}; present.forEach(n => { c[n] = 0; }); history.forEach(h => { if (c[h.name] !== undefined) c[h.name] += 1; }); return c; }
      function roll() {
        const c = counts(); const max = Math.max.apply(null, present.map(n => c[n])); const weighted = [];
        present.forEach(n => { const w = (max - c[n]) + 1; for (let i = 0; i < w; i++) weighted.push(n); });
        setRolling(true); setConfirmed(false); setPending(null); let ticks = 0;
        const iv = setInterval(() => {
          setFlash(present[Math.floor(Math.random()*present.length)]); ticks++;
          if (ticks > 12) { clearInterval(iv); const pick = weighted[Math.floor(Math.random()*weighted.length)]; setFlash(pick); setRolling(false); setPending(pick); }
        }, 70);
      }
      function confirmWash() { if (!pending) return; setHistory(history.concat([{ name: pending, night: night, ts: Date.now() }])); setConfirmed(true); setPending(null); }
      function credit(name) { setHistory(history.concat([{ name: name, night: night, ts: Date.now() }])); setCreditOpen(false); }
      const c = counts();
      return (
        <Card className="p-5">
          <SectionHead bg="bg-sonnenorange" icon={<IcUtensils size={20} />} title="Abwasch-Dienst" sub={"Anwesend: " + present.length + " Personen"} />
          <div className="text-center py-4 bg-wolkenweiss rounded-xl mb-3">
            <div className="text-xs text-steingrau mb-1">{flash ? (rolling ? "wird ausgewürfelt …" : (confirmed ? "hat abgewaschen ✓" : (pending ? "ausgewürfelt" : "Heute spült"))) : "Noch nicht gewürfelt"}</div>
            <div className="text-2xl font-semibold text-tiefblau min-h-[2rem]">{flash || "—"}</div>
          </div>
          {pending && !rolling && (
            <div className="mb-3 p-3 bg-sonnenorange/15 rounded-xl">
              <div className="text-xs text-tiefblau mb-2 text-center">Hat <span className="font-semibold">{pending}</span> wirklich abgewaschen? Erst dann wird es gezählt.</div>
              <div className="flex gap-2">
                <button onClick={confirmWash} className="flex-1 flex items-center justify-center gap-1.5 bg-tuerkis text-white text-sm font-medium rounded-xl py-2 active:scale-95 transition"><IcCheck size={16} /> Ja, hat abgewaschen</button>
                <button onClick={roll} className="flex-1 bg-white text-steingrau text-sm rounded-xl py-2 active:scale-95 transition">Neu würfeln</button>
              </div>
            </div>
          )}
          <button onClick={roll} disabled={rolling} className="w-full flex items-center justify-center gap-2 bg-tiefblau text-white font-medium rounded-xl py-3 active:scale-[0.98] transition disabled:opacity-60"><IcDice size={20} /> {rolling ? "Würfelt …" : "Abwasch auswürfeln"}</button>
          <div className="text-[11px] text-steingrau text-center mt-2">Fair gewichtet: Wer seltener dran war, wird häufiger gezogen.</div>
          <div className="mt-4">
            <div className="text-xs font-semibold text-steingrau uppercase tracking-wide mb-2">Bisher dran gewesen</div>
            <div className="flex flex-wrap gap-2">{present.map(n => <span key={n} className="text-xs px-2.5 py-1 rounded-full bg-seegruen/40 text-tiefblau">{n} · {c[n]}×</span>)}</div>
            {!creditOpen && <button onClick={() => setCreditOpen(true)} className="mt-3 text-xs text-meeresblau">+ Jemand hat freiwillig gespült</button>}
            {creditOpen && (
              <div className="mt-3">
                <div className="text-xs text-steingrau mb-1.5">Wer hat gespült? (zählt dazu, dann seltener dran)</div>
                <div className="flex flex-wrap gap-2">{present.map(n => <button key={n} onClick={() => credit(n)} className="text-xs px-2.5 py-1 rounded-full bg-sonnenorange/20 text-tiefblau active:scale-95 transition">{n}</button>)}</div>
                <button onClick={() => setCreditOpen(false)} className="mt-2 text-xs text-steingrau">abbrechen</button>
              </div>
            )}
            {history.length > 0 && <button onClick={() => { if (confirm("Verlauf zurücksetzen?")) setHistory([]); }} className="mt-3 block text-xs text-steingrau underline">Verlauf zurücksetzen</button>}
          </div>
        </Card>
      );
    }

    function SpotifyCard() {
      const valid = SPOTIFY_PLAYLIST_ID && SPOTIFY_PLAYLIST_ID !== "HIER_DEINE_ID_EINSETZEN";
      return (

          <SectionHead bg="bg-tuerkis" icon={<IcMusic size={20} />} title="Bordmusik" />

            <ConsentEmbed title="Playlist von Spotify" note="Beim Laden können Daten (u. a. deine IP) an Spotify übertragen werden. Spotify setzt eigene Cookies.">
              <iframe title="Spotify Playlist" style={{ borderRadius: "12px" }} src={"https://open.spotify.com/embed/playlist/" + SPOTIFY_PLAYLIST_ID + "?utm_source=generator"} width="100%" height="352" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" />
            </ConsentEmbed>
          ) : <div className="text-sm text-steingrau bg-wolkenweiss rounded-xl p-4">Noch keine Playlist hinterlegt.</div>}
        </Card>
      );

    function CompassCard() {
      const [order, setOrder] = useState(() => shuffle(range(COMPASS_QUESTIONS.length)));
      const [pos, setPos] = useState(0);
      const [dx, setDx] = useState(0);
      const startX = useRef(null);
      const len = COMPASS_QUESTIONS.length;
      function next() { setPos(p => (p + 1) % len); }
      function prev() { setPos(p => (p - 1 + len) % len); }
      function reshuffle() { setOrder(shuffle(range(len))); setPos(0); }
      function onStart(e) { startX.current = e.touches[0].clientX; }
      function onMove(e) { if (startX.current != null) setDx(e.touches[0].clientX - startX.current); }
      function onEnd() { if (dx < -45) next(); else if (dx > 45) prev(); setDx(0); startX.current = null; }
      const q = COMPASS_QUESTIONS[order[pos]];
      return (
        <Card className="p-5">
          <SectionHead bg="bg-tuerkis" icon={<IcSpark size={20} />} title="Kompass der Fragen" />
          <div onTouchStart={onStart} onTouchMove={onMove} onTouchEnd={onEnd}
               className="rounded-2xl p-6 text-center select-none"
               style={{ background:"linear-gradient(135deg,#147A8B,#2BB9B1)", transform:"translateX(" + dx + "px) rotate(" + (dx*0.02) + "deg)", transition: startX.current == null ? "transform .25s ease" : "none", touchAction:"pan-y" }}>
            <div className="text-white text-lg font-medium min-h-[6rem] flex items-center justify-center">{q}</div>
            <div className="text-[11px] text-white/70 mt-2">Frage {pos + 1} von {len}</div>
          </div>
          <div className="flex items-center justify-center gap-6 mt-3 text-steingrau">
            <button onClick={prev} className="p-1.5 active:scale-90 transition" aria-label="Zurück"><IcChevLeft size={20} /></button>
            <button onClick={next} className="text-sm font-medium text-meeresblau active:scale-95 transition">Nächste Frage</button>
            <button onClick={reshuffle} className="p-1.5 active:scale-90 transition" aria-label="Mischen"><IcShuffle size={18} /></button>
          </div>
        </Card>
      );
    }

          <TodayStage onOpenEtappen={props.onOpenEtappen} />

    /* ============================================================
       TAB: ETAPPEN  (von -> nach, eigene Meilen, Logbuch)
       ============================================================ */
    function HarborPicker(props) {
      return (
        <select value={props.value || ""} onChange={(e) => props.onPick(e.target.value)} className={props.cls}>
          <option value="">— frei eingeben —</option>
          {HARBORS.map(h => <option key={h.id} value={h.id}>{h.name}</option>)}

    function StageForm(props) {
      const s = props.stage;
      const [von, setVon] = useState(s.von || "");

      const field = "w-full rounded-xl bg-wolkenweiss border border-wolkenweiss px-3 py-2 text-sm text-tiefblau outline-none focus:border-tuerkis";
      function pickNach(id) { setNachId(id); const h = harborById(id); if (h) setNach(h.name); }
      function save() { props.onSave(Object.assign({}, s, { von, nach, nachId: nachId || null, dateISO, miles: Number(miles) || 0, note })); }
      return (
        <div className="space-y-3">
          <div><label className="text-xs text-steingrau">Von</label><input value={von} onChange={(e) => setVon(e.target.value)} className={field} placeholder="Starthafen der Etappe" /></div>
          <div>
            <label className="text-xs text-steingrau">Nach (Ziel / Übernachtung)</label>

          <div className="flex gap-2">
            <div className="flex-1"><label className="text-xs text-steingrau">Datum</label><input type="date" value={dateISO} onChange={(e) => setDateISO(e.target.value)} className={field} /></div>
            <div className="w-28"><label className="text-xs text-steingrau">Meilen (SM)</label><input type="number" inputMode="decimal" value={miles} onChange={(e) => setMiles(e.target.value)} className={field} /></div>
          </div>
          <div><label className="text-xs text-steingrau">Notiz</label><input value={note} onChange={(e) => setNote(e.target.value)} className={field} placeholder="z. B. Crewwechsel" /></div>
          <div className="text-[11px] text-steingrau bg-wolkenweiss rounded-lg px-3 py-2">Änderungen an dieser Etappe gelten für die ganze Crew.</div>
          <div className="flex gap-2 pt-1">

        </div>

    function StageCard(props) {
      const s = props.stage;
      const [open, setOpen] = useState(false);
      const [edit, setEdit] = useState(false);
      const h = s.nachId ? harborById(s.nachId) : null;
      const title = s.von ? s.von + " → " + s.nach : (s.nach || "—");
      return (
        <Card className={"p-4 " + (props.isToday ? "ring-2 ring-tuerkis" : "")}>
          <div className="flex items-center gap-3">
            <div className="flex flex-col items-center justify-center w-10 shrink-0">
              <div className="text-[10px] text-steingrau">Tag</div><div className="text-lg font-semibold text-tiefblau leading-none">{props.num}</div>
            </div>
            <button onClick={() => setOpen(!open)} className="flex-1 min-w-0 text-left">
              <div className="flex items-center gap-2"><span className="font-semibold text-tiefblau truncate">{title}</span>{props.isToday && <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-tuerkis text-white shrink-0">heute</span>}</div>
              <div className="text-xs text-steingrau">{fmtDate(s.dateISO)}{s.miles > 0 ? " · " + s.miles + " SM" : ""}{s.note ? " · " + s.note : ""}</div>
            </button>
            <button onClick={() => setOpen(!open)} className={"text-steingrau transition-transform " + (open ? "rotate-180" : "")}><IcChevron size={20} /></button>
          </div>

    function TabEtappen() {
      const d = useDay();
      const [stages, setStages] = useLocalStorage("tm_stages_v4", STAGES_SEED);
      function saveAt(i, ns) { setStages(stages.map((s, k) => k === i ? ns : s)); }
      function del(i) { setStages(stages.filter((s, k) => k !== i)); }
      function move(i, dir) { const j = i + dir; if (j < 0 || j >= stages.length) return; const a = stages.slice(); const t = a[i]; a[i] = a[j]; a[j] = t; setStages(a); }
      function add() {
        const last = stages[stages.length - 1];
        const nextDate = last && last.dateISO ? new Date(new Date(last.dateISO + "T00:00:00").getTime() + 86400000).toISOString().slice(0, 10) : "";
        setStages(stages.concat([{ id: "s" + Date.now(), dateISO: nextDate, von: last ? last.nach : "", nach: "", nachId: null, miles: 0, note: "", log: "" }]));
      }
      const totalMiles = stages.reduce((a, s) => a + (Number(s.miles) || 0), 0);
      return (
        <div className="space-y-3">
          <div className="text-xs text-steingrau bg-white rounded-xl p-3">Vorläufige Törnplanung als Orientierung. Route und Übernachtungen passen Skipper und Crew je nach Wetter und Lust laufend an.</div>

          <Card className="p-4 flex items-center justify-between">
            <span className="text-sm text-steingrau">Gesamt</span>
            <span className="font-semibold text-tiefblau">{totalMiles} SM</span>

        const parts = [h.name, h.type];

    function CheckList(props) {
      const [items, setItems] = useLocalStorage(props.storageKey, props.seed || []);
      const [draft, setDraft] = useState("");
      const [showDone, setShowDone] = useState(false);
      const [cat, setCat] = useState(null);
      const [bulkOpen, setBulkOpen] = useState(false);
      const [bulk, setBulk] = useState("");
      const headers = items.filter(it => it.header);
      const effectiveCat = (cat !== null) ? cat : (headers[0] ? headers[0].id : "");
      function toggle(id) { setItems(items.map(it => it.id === id ? Object.assign({}, it, { done: !it.done }) : it)); }
      function insertInto(arr, newItems, targetCat) {
        if (headers.length > 0 && targetCat) {
          let hi = -1;
          for (let i = 0; i < arr.length; i++) { if (arr[i].id === targetCat) { hi = i; break; } }
          if (hi < 0) { return arr.concat(newItems); }
          let j = hi + 1; while (j < arr.length && !arr[j].header) j++;
          const out = arr.slice(); out.splice.apply(out, [j, 0].concat(newItems)); return out;
        }
        return arr.concat(newItems);
      }
      function add() {
        const t = draft.trim(); if (!t) return;
        const item = { id: "u" + Date.now(), text: t, done: false, header: false };
        setItems(insertInto(items, [item], effectiveCat)); setDraft("");
      }
      function addBulk() {
        const lines = bulk.split("\n").map(s => s.trim()).filter(Boolean);
        if (lines.length === 0) { setBulkOpen(false); return; }
        const newItems = lines.map((t, i) => ({ id: "u" + Date.now() + "_" + i, text: t, done: false, header: false }));
        setItems(insertInto(items, newItems, effectiveCat)); setBulk(""); setBulkOpen(false);
      }
      function remove(it) {
        const msg = it.header
          ? "Kategorie „" + it.text + "\" für die ganze Crew löschen?"
          : "„" + it.text + "\" für die ganze Crew löschen? Tipp: Du kannst den Eintrag auch einfach abhaken statt ihn zu löschen.";
        if (confirm(msg)) setItems(items.filter(x => x.id !== it.id));
      }
      const real = items.filter(it => !it.header);
      const done = real.filter(it => it.done).length;
      const visible = items.filter(it => it.header || !it.done || showDone);
      const field = "rounded-xl bg-wolkenweiss border border-wolkenweiss px-3 py-2 text-sm text-tiefblau outline-none focus:border-tuerkis";
      return (
        <div>
          <div className="mb-4"><ProgressBar done={done} total={real.length} /></div>
          {headers.length > 0 && (
            <select value={effectiveCat} onChange={(e) => setCat(e.target.value)} className={"w-full mb-2 " + field}>
              {headers.map(h => <option key={h.id} value={h.id}>{h.text}</option>)}
            </select>
          )}
          <div className="flex gap-2 mb-2">
            <input value={draft} onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") add(); }} placeholder="Hinzufügen …" className={"flex-1 " + field} />
            <button onClick={add} className="bg-tuerkis text-white rounded-xl px-3 active:scale-95 transition"><IcPlus size={20} /></button>
          </div>
          {!bulkOpen && <button onClick={() => setBulkOpen(true)} className="text-xs text-meeresblau mb-3">Ganze Liste einfügen</button>}
          {bulkOpen && (
            <div className="mb-3 p-3 bg-wolkenweiss rounded-xl">
              <div className="text-xs text-steingrau mb-1.5">Mehrere Einträge, eine Zeile pro Eintrag{headers.length > 0 ? " (kommt in die oben gewählte Kategorie)" : ""}:</div>
              <textarea value={bulk} onChange={(e) => setBulk(e.target.value)} rows={5} placeholder={"z. B.\nRettungswesten prüfen\nFeuerlöscher\nSeekarten"} className={"w-full " + field} />
              <div className="flex gap-2 mt-2">
                <button onClick={addBulk} className="flex-1 bg-tuerkis text-white text-sm font-medium rounded-xl py-2 active:scale-95 transition">Alle hinzufügen</button>
                <button onClick={() => { setBulkOpen(false); setBulk(""); }} className="flex-1 bg-white text-steingrau text-sm rounded-xl py-2">Abbrechen</button>
              </div>
            </div>
          )}
          <div className="space-y-1.5">
            {items.length === 0 && <div className="text-sm text-steingrau">Noch nichts auf der Liste.</div>}
            {visible.map(it => it.header ? (
              <div key={it.id} className="flex items-center justify-between pt-3 pb-1">
                <span className="text-xs font-semibold text-steingrau uppercase tracking-wide">{it.text}</span>
                <button onClick={() => remove(it)} className="text-steingrau/40 hover:text-sonnenorange p-1"><IcTrash size={14} /></button>
              </div>
            ) : (
              <div key={it.id} className="flex items-center gap-3">
                <button onClick={() => toggle(it.id)} className={"shrink-0 w-6 h-6 rounded-md flex items-center justify-center border-2 transition " + (it.done ? "bg-tuerkis border-tuerkis text-white" : "border-steingrau/40 text-transparent")}><IcCheck size={16} /></button>
                <span className={"flex-1 text-sm " + (it.done ? "line-through text-steingrau" : "text-tiefblau")}>{it.text}</span>
                <button onClick={() => remove(it)} className="text-steingrau/50 hover:text-sonnenorange p-1"><IcTrash size={16} /></button>
              </div>
            ))}
          </div>
          {done > 0 && (
            <button onClick={() => setShowDone(!showDone)} className="mt-3 text-xs text-meeresblau">{showDone ? "Erledigte ausblenden" : done + " erledigte anzeigen"}</button>
          )}
        </div>
      );
    }

    function Converter() {
      const [sm, setSm] = useState("");
      const [kn, setKn] = useState("");
      const km = sm !== "" && !isNaN(sm) ? (Number(sm) * 1.852).toFixed(2) : "";
      const kmh = kn !== "" && !isNaN(kn) ? (Number(kn) * 1.852).toFixed(2) : "";
      const field = "w-full rounded-lg bg-wolkenweiss border border-wolkenweiss px-3 py-2 text-sm text-tiefblau outline-none focus:border-tuerkis";
      return (
        <div className="space-y-3">

            <div className="flex-1"><label className="text-xs text-steingrau">Seemeilen</label><input type="number" inputMode="decimal" value={sm} onChange={(e) => setSm(e.target.value)} className={field} placeholder="z. B. 22" /></div>
            <div className="pb-2 text-steingrau">=</div>
            <div className="flex-1"><div className="text-xs text-steingrau">Kilometer</div><div className="rounded-lg bg-seegruen/30 px-3 py-2 text-sm text-tiefblau font-medium">{km || "—"} km</div></div>
          </div>
          <div className="flex items-end gap-2">
            <div className="flex-1"><label className="text-xs text-steingrau">Knoten</label><input type="number" inputMode="decimal" value={kn} onChange={(e) => setKn(e.target.value)} className={field} placeholder="z. B. 6" /></div>
            <div className="pb-2 text-steingrau">=</div>
            <div className="flex-1"><div className="text-xs text-steingrau">km/h</div><div className="rounded-lg bg-seegruen/30 px-3 py-2 text-sm text-tiefblau font-medium">{kmh || "—"} km/h</div></div>
          </div>
          <div className="text-xs text-steingrau">Faustregel Ankerkette: mindestens 4- bis 5-fache Wassertiefe, bei Böen mehr.</div>
        </div>
      );
    }
    function TabWissen() {
      const [voiceHint, setVoiceHint] = useState(false);
      useEffect(() => { if ("speechSynthesis" in window) { window.speechSynthesis.getVoices(); window.speechSynthesis.onvoiceschanged = function () {}; } }, []);
      function trySpeak(text) {
        const voices = ("speechSynthesis" in window) ? (window.speechSynthesis.getVoices() || []) : [];
        if (!voices.some(v => v.lang && v.lang.toLowerCase().indexOf("tr") === 0)) setVoiceHint(true);
        speak(text);
      }
      return (
        <div className="space-y-4">
          <Collapsible bg="bg-meeresblau" icon={<IcCompass size={20} />} title="Segel-Basics" defaultOpen={true}>
            <div className="space-y-3">{SAIL_BASICS.map((b, i) => <div key={i}><div className="font-medium text-tiefblau text-sm">{b.term}</div><div className="text-sm text-steingrau">{b.text}</div></div>)}</div>
          </Collapsible>
          <Collapsible bg="bg-tiefblau" icon={<IcAnchor size={20} />} title="Konkrete Manöver">
            <div className="space-y-4">{MANEUVERS.map((m, i) => (
              <div key={i}>
                <div className="font-medium text-tiefblau text-sm mb-1">{m.name}</div>
                <ol className="space-y-1">{m.steps.map((st, k) => <li key={k} className="text-sm text-steingrau flex gap-2"><span className="text-tuerkis font-semibold">{k + 1}.</span><span>{st}</span></li>)}</ol>
              </div>
            ))}</div>
          </Collapsible>
          <Collapsible bg="bg-tuerkis" icon={<IcCompass size={20} />} title="Einheiten & Umrechnung">
            <Converter />
          </Collapsible>
          <Collapsible bg="bg-meeresblau" icon={<IcExternal size={20} />} title="Knoten lernen">
            <div className="space-y-3 mb-3">{KNOTS.map((k, i) => <div key={i}><div className="font-medium text-tiefblau text-sm">{k.name}</div><div className="text-sm text-steingrau">{k.text}</div></div>)}</div>
            <div className="text-sm text-steingrau mb-2">Schritt-für-Schritt mit Video:</div>
            <div className="space-y-2">{KNOT_LINKS.map((l, i) => <a key={i} href={l.url} target="_blank" rel="noopener noreferrer" className="flex items-center gap-2 text-sm text-meeresblau"><IcExternal size={16} /> {l.label}</a>)}</div>
          </Collapsible>
          <Collapsible bg="bg-tuerkis" icon={<IcVolume size={20} />} title="Türkisch für an Bord">
            {voiceHint && <div className="text-xs text-steingrau bg-wolkenweiss rounded-lg p-2 mb-3">Auf diesem Gerät ist keine türkische Stimme installiert, die Aussprache funktioniert daher eventuell nicht.</div>}
            <div className="space-y-1.5">{TR_PHRASES.map((p, i) => (
              <div key={i} className="flex items-center gap-3">
                <button onClick={() => trySpeak(p.tr)} className="shrink-0 w-9 h-9 rounded-full bg-seegruen/50 text-meeresblau flex items-center justify-center active:scale-90 transition"><IcVolume size={18} /></button>
                <div className="flex-1"><div className="text-sm font-medium text-tiefblau">{p.tr}</div><div className="text-xs text-steingrau">{p.de}</div></div>
              </div>
            ))}</div>
          </Collapsible>
          <Collapsible bg="bg-sonnenorange" icon={<IcPhone size={20} />} title="Notfall & Mayday">
            <div className="space-y-2">{EMERGENCY.map((e, i) => <div key={i} className="flex items-center justify-between bg-wolkenweiss rounded-lg px-3 py-2"><span className="text-sm text-tiefblau">{e.label}</span><span className="text-sm font-semibold text-tiefblau">{e.value}</span></div>)}</div>
            <div className="mt-3 bg-sand/60 rounded-xl p-3 text-sm text-tiefblau/90">
              <div className="flex items-center gap-2 font-semibold mb-1"><IcAlert size={16} /> Mayday-Ablauf</div>
              <p>Auf UKW-Kanal 16: „Mayday, Mayday, Mayday", dann den Bootsnamen dreimal nennen. Danach Position durchgeben, Art des Notfalls schildern, Zahl der Personen an Bord nennen und sagen, welche Hilfe benötigt wird. Langsam und deutlich sprechen, auf Antwort warten.</p>
            </div>
            <div className="mt-2 text-xs text-steingrau">Notrufnummern vor Reiseantritt vor Ort verifizieren, sie können sich ändern.</div>
          </Collapsible>
        </div>
      );
    }

    /* ============================================================
       FOOTER + SHELL
       ============================================================ */
    function LegalFooter() {
      const [open, setOpen] = useState(false);
      const [consent, setConsent] = useLocalStorage("tm_ext_consent", false);
      return (
        <div className="mt-6 mb-2 text-center">
          <button onClick={() => setOpen(!open)} className="text-xs text-steingrau underline">Rechtlicher Hinweis & Datenschutz</button>
          {open && (
            <div className="mt-2 text-xs text-steingrau space-y-2 bg-white rounded-xl p-4 text-left">
              <p>Diese App ist eine private, nicht-kommerzielle Anwendung und ausschließlich für den persönlichen Gebrauch einer geschlossenen Reisegruppe gedacht (privater bzw. familiärer Bereich).</p>
              <p><span className="font-semibold text-tiefblau">Deine Eingaben:</span> Alle Inhalte (Listen, Etappen, Logbuch, Abwasch-Verlauf) werden ausschließlich lokal im Speicher deines Browsers (localStorage) auf deinem Gerät abgelegt. Es gibt keine Nutzerkonten, keine Server, kein Tracking und keine Analyse. Diese lokale Speicherung dient nur der Funktion der App. Über die Einstellungen deines Browsers kannst du diese Daten jederzeit löschen.</p>
              <p><span className="font-semibold text-tiefblau">Keine eigenen Cookies:</span> Die App selbst setzt keine Cookies und verwendet keine Werbe- oder Statistik-Dienste.</p>
              <p><span className="font-semibold text-tiefblau">Externe Inhalte:</span> An einigen Stellen können Inhalte Dritter eingebettet werden: die Playlist von Spotify, die Windkarte von Windy.com sowie die Revierkarte (Kartenmaterial von OpenStreetMap, Programmbibliothek Leaflet über den CDN jsDelivr). Diese Inhalte werden erst geladen, nachdem du aktiv auf „Inhalt laden" getippt hast. Beim Laden kann deine IP-Adresse an den jeweiligen Anbieter übertragen werden, und die Anbieter können eigene Cookies setzen. Es gelten deren Datenschutzbestimmungen (spotify.com, windy.com, openstreetmap.org).</p>
              <p><span className="font-semibold text-tiefblau">Standort:</span> Auf der Karte kannst du optional deine eigene Position anzeigen lassen. Dein Gerät fragt dann um Erlaubnis. Die Position wird nur direkt auf der Karte in deinem Browser angezeigt, nirgends gespeichert und an niemanden übertragen.</p>
              <p><span className="font-semibold text-tiefblau">Inhalte:</span> Sämtliche Texte wurden selbst verfasst oder aus öffentlich zugänglichen Quellen zusammengetragen und in eigenen Worten neu formuliert. Die Revierangaben ersetzen keine amtlichen Seekarten und sind nicht zur Navigation geeignet.</p>
              <p><span className="font-semibold text-tiefblau">Karte / Lizenzen:</span> Leaflet (© Volodymyr Agafonkin und Mitwirkende, BSD-2-Clause-Lizenz, leafletjs.com), Kartenmaterial © OpenStreetMap-Mitwirkende (Open Database License, ODbL).</p>
              <div className="pt-1">
                <button onClick={() => setConsent(!consent)} className="text-xs text-meeresblau underline">{consent ? "Zustimmung zu externen Inhalten widerrufen" : "Externe Inhalte sind aktuell nicht geladen"}</button>
              </div>
              <p className="text-[10px] text-steingrau/80 pt-1">Hinweis: Dies ist kein Rechtstext von Juristen, sondern eine sorgfältige Selbsteinschätzung für den privaten Gebrauch.</p>
            </div>
          )}
        </div>
      );
    }
    function App() {
      const [tab, setTab] = useState("heute");
      const TABS = [
        { id:"heute", label:"Heute", icon:IcHome },
        { id:"etappen", label:"Etappen", icon:IcMap },
        { id:"guide", label:"Segelguide", icon:IcAnchor },
        { id:"listen", label:"Listen", icon:IcBasket },
        { id:"wissen", label:"Wissen", icon:IcBook }
      ];
      return (
        <DayProvider>
          <div className="min-h-screen flex flex-col max-w-md mx-auto">
            <header className="sticky top-0 z-10 bg-wolkenweiss/95 backdrop-blur border-b border-black/5" style={{ paddingTop:"env(safe-area-inset-top)" }}>
              <div className="flex items-center gap-3 px-4 py-3">
                <img src={MARK_SRC} alt="TörnMate" width="40" height="40" className="rounded-full" />
                <div className="leading-tight"><div className="text-lg font-semibold text-tiefblau">{APP_NAME}</div><div className="text-xs text-meeresblau">{APP_TAGLINE}</div></div>
              </div>
            </header>
            <main className="flex-1 px-4 pt-4 pb-28 no-scrollbar">
              {tab === "heute" && <TabHeute onOpenEtappen={() => setTab("etappen")} />}
              {tab === "etappen" && <TabEtappen />}
              {tab === "guide" && <TabSegelguide />}
              {tab === "listen" && <TabListen />}
              {tab === "wissen" && <TabWissen />}
              <LegalFooter />
            </main>
            <nav className="fixed bottom-0 left-0 right-0 z-10 max-w-md mx-auto bg-white border-t border-black/5" style={{ paddingBottom:"env(safe-area-inset-bottom)" }}>
              <div className="flex">
                {TABS.map(t => { const Active = tab === t.id; const Ic = t.icon; return (
                  <button key={t.id} onClick={() => setTab(t.id)} className={"flex-1 flex flex-col items-center gap-1 py-2.5 transition " + (Active ? "text-tiefblau" : "text-steingrau")}>
                    <Ic size={22} /><span className="text-[10px] font-medium">{t.label}</span>
                  </button>
                ); })}
              </div>
            </nav>
          </div>
        </DayProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <!-- Boot: CDN-Globals pruefen, JSX transpilieren, Fehler sichtbar machen -->
  <script>
    (function () {
      function show(html) {
        var r = document.getElementById("root");
        if (r) r.innerHTML = '<div style="font-family:Poppins,sans-serif;max-width:520px;margin:48px auto;padding:24px;color:#0D2B45;line-height:1.5">' + html + '</div>';
      }
      window.addEventListener("error", function (e) {
        if (window.__tmReady) return;
        var msg = (e && e.message) ? e.message : String(e);
        show('<b style="color:#147A8B">TörnMate konnte nicht starten</b><br><br><code style="white-space:pre-wrap;display:block;background:#F7F9FA;border-radius:8px;padding:12px;color:#b00020;font-size:13px">' + msg + '</code><br>Falls hier von React, ReactDOM oder Babel die Rede ist, lag es an der CDN-Verbindung &ndash; einfach neu laden. Andernfalls schick mir diese Meldung als Screenshot.');
      });
      var tries = 0;
      function boot() {
        tries++;
        if (!(window.React && window.ReactDOM && window.Babel)) {
          if (tries > 100) { show('<b style="color:#147A8B">Bibliotheken nicht geladen</b><br><br>React, ReactDOM oder Babel konnte nicht vom CDN geladen werden. Bitte Internetverbindung pruefen und neu laden. Ein Adblocker oder ein Firmen-/Schul-Netzwerk kann jsdelivr.net blockieren.'); return; }
          setTimeout(boot, 100); return;
        }
        try {
          var src = document.getElementById("appsrc").textContent;
          var out = Babel.transform(src, { presets: ["react"], sourceType: "script" }).code;
          (0, eval)(out);
          window.__tmReady = true;
        } catch (err) {
          var m = (err && err.message) ? err.message : String(err);
          show('<b style="color:#147A8B">Fehler im App-Code</b><br><br><code style="white-space:pre-wrap;display:block;background:#F7F9FA;border-radius:8px;padding:12px;color:#b00020;font-size:13px">' + m + '</code>');
        }
      }
      if (document.readyState !== "loading") boot();
      else document.addEventListener("DOMContentLoaded", boot);
    })();
  </script>
